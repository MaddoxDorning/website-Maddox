<!doctype html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cyber Tools Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="../styles/main-style.css">

</head>

<body class="d-flex flex-column min-vh-100">

<nav class="navbar navbar-expand-sm navbar-dark">
<div class="container">

<a class="navbar-brand fw-bold" href="../index.html">
CyberTools
</a>

<div class="ms-auto d-flex gap-2">

<a href="data.html" class="btn btn-outline-light">
Session Data
</a>

<button id="btnLogout" class="btn btn-light">
Logout
</button>

</div>

</div>
</nav>

<div class="container mt-5">

<h2 class="text-center dashboard-title mb-4">
Cyber Tools Dashboard
</h2>

<div class="search-panel mb-4">

<div class="row g-3 align-items-center">

<div class="col-md-6">

<input
type="text"
id="searchInput"
class="form-control"
placeholder="Search security tools..."
>

</div>

<div class="col-md-3">

<select id="filterSelect" class="form-select">

<option value="All">All Categories</option>
<option value="Network Analysis">Network Analysis</option>
<option value="Network Scanning">Network Scanning</option>
<option value="Exploitation">Exploitation</option>
<option value="Digital Forensics">Digital Forensics</option>
<option value="Encryption">Encryption</option>

</select>

</div>


<div class="col-md-3">

<button id="sortButton" class="btn btn-primary w-100">
Sort A → Z
</button>

</div>

</div>

</div>

<div class="row" id="toolContainer">

</div>
</div>

<footer class="mt-auto py-3 text-center text-muted">
© 2026 Maddox Dorning • Cyber Tools Dashboard
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../scripts/login-logout.js"></script>
<script src="../scripts/dashboard.js"></script>

</body>
</html>
